<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Basic page setup -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tasks - Study Task Manager</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="assets/study_favicon.png">

    <!-- Link to the stylesheets -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/tasks.css">
</head>
<body>

    <!-- Main header section -->
    <header>
        <h1>Study Task Manager</h1>

        <!-- Navigation links to all pages -->
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="tasks.html" class="active">Tasks</a></li>
                <li><a href="blog.html">Blog</a></li>
                <li><a href="ethics.html">Ethics</a></li>
            </ul>
        </nav>
    </header>

    <!-- Main content area -->
    <main>
        <!-- Login section - restricts access to the task management page -->
        <section id="loginSection">
            <h2>Login</h2>
            <form id="loginForm">
                <label for="username" class="required">Username</label>
                <input type="text" id="username" placeholder="Enter username">

                <label for="password" class="required">Password</label>
                <input type="password" id="password" placeholder="Enter password">

                <button type="submit">Login</button>
            </form>
        </section>

        <!-- Task management section - hidden until user logs in -->
        <section id="taskSection" class="hidden">
            <h2>Study Task Management</h2>

            <!-- Form to add a new task -->
            <form id="taskForm">
                <label for="taskTitle" class="required">Task Title</label>
                <input type="text" id="taskTitle" placeholder="e.g. Assignment 3.1">

                <label for="courseCode" class="required">Course Code</label>
                <input type="text" id="courseCode" placeholder="e.g. INFO1012">

                <label for="courseName">Course Name</label>
                <input type="text" id="courseName" placeholder="e.g. Information Technology Systems">

                <label for="dueDate" class="required">Due Date</label>
                <input type="date" id="dueDate">

                <label for="description">Description</label>
                <textarea id="description" rows="3" placeholder="What does this task involve?"></textarea>

                <label for="notes">Notes</label>
                <textarea id="notes" rows="2" placeholder="Any extra notes?"></textarea>

                <div class="form-buttons">
                    <button type="submit" id="addTaskBtn">Add Task</button>
                    <button type="button" id="cancelBtn">Cancel</button>
                </div>
            </form>
        </section>

        <!-- Search bar to filter tasks -->
        <div id="searchBar" class="hidden">
            <label for="searchInput">Search Tasks:</label>
            <input type="text" id="searchInput" placeholder="Title, course code or course name">
            <button id="clearSortBtn">Clear Sort</button>
        </div>

        <!-- Task list section -->
        <section id="taskListSection" class="hidden">
            <!-- tasks render here -->
        </section>

        <!-- Current date and time section -->
        <section id="dateTimeSection">
            <h2>Current Date and Time</h2>
            <p id="currentDateTime">Loading current date and time...</p>
        </section>

        <!-- Logout button - only visible when logged in -->
        <div id="logoutContainer" class="hidden">
            <button id="logoutBtn">Log Out</button>
        </div>
    </main>

    <!-- Footer section -->
    <footer>
        <p>&copy; 2026 Huy Nguyen — Study Task Manager</p>
    </footer>

    <!-- Link to task management JavaScript -->
    <script src="js/tasks.js"></script>

</body>
</html>
