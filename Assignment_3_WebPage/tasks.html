<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Basic page setup -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tasks - Study Task Manager</title>

    <!-- Link to the shared stylesheet -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Main header section -->
    <header>
        <h1>Study Task Manager</h1>

        <!-- Navigation links to all pages -->
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="tasks.html" class="active">Tasks</a></li>
                <li><a href="blog.html">Blog</a></li>
                <li><a href="ethics.html">Ethics</a></li>
            </ul>
        </nav>
    </header>

    <!-- Main content area -->
    <main>
        <!-- Login section - restricts access to the task management page -->
        <section id="loginSection">
            <h2>Login</h2>
            <form id="loginForm">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="Enter username">

                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter password">

                <button type="submit">Login</button>
            </form>
        </section>

        <!-- Task management section - hidden until user logs in -->
        <section id="taskSection" class="hidden">
            <h2>Study Task Management</h2>
            <p>Please log in to manage your tasks.</p>
        </section>

        <!-- Task list section -->
        <section id="taskListSection" class="hidden">
            <h2>Current Tasks</h2>
            <p>No tasks yet.</p>
        </section>
    </main>

    <!-- Footer section -->
    <footer>
        <p>&copy; 2026 Huy Nguyen — Study Task Manager</p>
    </footer>

</body>
</html>
